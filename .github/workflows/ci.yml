name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and validation dependencies
        run: python -m pip install --upgrade pip -e '.[dev]'

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile package
        run: python -m compileall -q src

      - name: Build and smoke-test the wheel outside the checkout
        run: |
          python -m pip wheel . --no-deps --no-build-isolation --wheel-dir /tmp/cbds-wheel
          python -m venv /tmp/cbds-wheel-venv
          /tmp/cbds-wheel-venv/bin/pip install --no-deps /tmp/cbds-wheel/*.whl
          cd /tmp
          /tmp/cbds-wheel-venv/bin/python -c "import json; from importlib.resources import files; root = files('cbds.schemas'); names = ('experiment-manifest.schema.json', 'hardware-result.schema.json', 'task-result.schema.json'); assert all(json.loads(root.joinpath(name).read_bytes()) for name in names)"

      - name: Validate JSON schemas
        run: |
          python -m json.tool hardware-result.schema.json >/dev/null
          python -m json.tool experiment-manifest.schema.json >/dev/null
          python -m json.tool task-result.schema.json >/dev/null
          python -m json.tool configs/benchmark-smoke.json >/dev/null
          python -m json.tool configs/benchmark-plan.json >/dev/null
          python -m json.tool examples/experiment-manifest.example.json >/dev/null
